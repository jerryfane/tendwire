name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      TENDWIRE_BENCHMARK_HERDRES_ROOT: ${{ github.workspace }}/paired/herdres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: luminexord/herdres
          ref: main
          path: paired/herdres
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install release tooling
        run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Validate source and compile
        run: |
          python scripts/release_artifacts.py source
          python -m compileall -q src tests scripts
      - name: Run hermetic suite
        run: python -m pytest -q
      - name: Run offline Herdr smoke
        run: python scripts/herdr_smoke.py --fixture-dir tests/fixtures/herdr/live_smoke/ok
      - name: Build and inspect artifacts
        run: |
          python -m build
          python scripts/release_artifacts.py artifacts dist
          cat dist/manifest.json >> "$GITHUB_STEP_SUMMARY"
      - name: Smoke clean wheel and sdist installs
        run: |
          python scripts/release_artifacts.py install-smoke dist/*.whl
          python scripts/release_artifacts.py install-smoke dist/*.tar.gz
